version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/erp_crm
      - DATABASE_URL_SYNC=postgresql+psycopg2://postgres:postgres@db:5432/erp_crm
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-change-me}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host 0.0.0.0

  whatsapp:
    build: ./whatsapp
    ports:
      - "3001:3001"
    depends_on:
      - backend
    volumes:
      - ./whatsapp:/app
      - whatsapp_data:/app/.wwebjs_auth

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: erp_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  whatsapp_data:
